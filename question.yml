name: ❓ Question
description: Ask about usage, setup, or anything else
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: "We'll get back to you as soon as possible."
  - type: textarea
    id: question
    attributes:
      label: What's your question?
      placeholder: e.g. How do I import CSV files?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Which version are you using?
      placeholder: e.g. Desktop V1.0.0
